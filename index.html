<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI超级学霸数学6年级</title>
  <style>
    :root {
      --green: #8fded7;
      --green-soft: #ebfbf9;
      --green-deep: #2f8188;
      --blue-soft: #f1fbfd;
      --blue: #b6ebe7;
      --pink: #f7bfd5;
      --pink-soft: #fff1f7;
      --pink-deep: #c96b91;
      --ink: #22475b;
      --muted: #6e8591;
      --border: #d9ecef;
      --surface: rgba(255,255,255,0.88);
      --shadow: 0 20px 50px rgba(55, 125, 130, 0.12);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(143, 222, 215, 0.22), transparent 30%),
        radial-gradient(circle at top right, rgba(247, 191, 213, 0.18), transparent 28%),
        linear-gradient(180deg, #f3fcfc 0%, #eefbfd 52%, #fff8fb 100%);
    }
    button, input { font: inherit; }
    button {
      border: 0;
      cursor: pointer;
      background: transparent;
      color: inherit;
    }
    .app {
      max-width: 1480px;
      margin: 0 auto;
      padding: 12px;
    }
    .topbar, .panel, .module-card, .sidebar, .content-wrap, .detail-toolbar, .report-card, .practice-card, .metric-card, .analysis-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-radius: 28px;
      padding: 16px 18px;
    }
    .title {
      font-size: 28px;
      font-weight: 900;
    }
    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .meta-pill {
      border-radius: 18px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 900;
    }
    .meta-pill.green { background: var(--green-soft); color: var(--green-deep); }
    .meta-pill.blue { background: var(--blue-soft); color: var(--green-deep); }
    .unlock-shell {
      min-height: calc(100vh - 24px);
      display: grid;
      place-items: center;
    }
    .unlock-shell.hidden, .app.hidden { display: none; }
    .unlock-card {
      width: min(760px, 100%);
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.82);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      border-radius: 34px;
      padding: 28px;
    }
    .unlock-hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 22px;
      align-items: center;
    }
    .unlock-title {
      margin-top: 18px;
      font-size: clamp(30px, 4.6vw, 50px);
      line-height: 1.08;
      font-weight: 900;
    }
    .unlock-text {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.9;
      font-weight: 700;
    }
    .unlock-panel {
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(235,251,249,0.94), rgba(241,251,253,0.94), rgba(255,241,247,0.9));
      border: 1px solid rgba(255,255,255,0.8);
      padding: 18px;
    }
    .unlock-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 900;
      letter-spacing: .12em;
    }
    .unlock-input {
      width: 100%;
      min-height: 56px;
      margin-top: 14px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.92);
      padding: 0 16px;
      color: var(--ink);
      font-size: 16px;
      font-weight: 800;
      outline: none;
    }
    .unlock-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
    }
    .unlock-help {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      font-weight: 800;
    }
    .unlock-status {
      min-height: 24px;
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.7;
      font-weight: 800;
    }
    .unlock-status.error { color: #c2410c; }
    .unlock-status.ok { color: var(--green-deep); }
    .unlock-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .unlock-metric {
      border-radius: 22px;
      padding: 14px;
      background: rgba(255,255,255,0.74);
    }
    .unlock-metric .small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
    }
    .unlock-metric .big {
      margin-top: 8px;
      font-size: 20px;
      font-weight: 900;
    }

    .home, .detail { margin-top: 16px; }
    .home.hidden, .detail.hidden, .mobile-overlay.hidden { display: none; }
    .panel {
      border-radius: 32px;
      padding: 20px;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 24px;
      align-items: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green-deep);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 900;
    }
    h1, h2, h3, p { margin: 0; }
    h1 {
      margin-top: 18px;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.08;
    }
    .lead {
      margin-top: 14px;
      max-width: 760px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
      font-weight: 650;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 20px;
    }
    .summary-box {
      border-radius: 24px;
      padding: 16px;
    }
    .summary-box.green { background: var(--green-soft); }
    .summary-box.blue { background: var(--blue-soft); }
    .summary-box.gray { background: #f6fbfc; }
    .summary-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .12em;
    }
    .summary-value {
      margin-top: 10px;
      font-size: 22px;
      font-weight: 900;
    }
    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 68px;
      margin-top: 20px;
      border-radius: 28px;
      background: linear-gradient(135deg, var(--pink), #f9d7e5);
      color: #7a3658;
      padding: 0 26px;
      font-size: 20px;
      font-weight: 900;
      transition: transform .18s ease, background .18s ease;
    }
    .primary-btn:hover { transform: translateY(-1px); background: #f3aac8; }
    .progress-wrap {
      display: flex;
      justify-content: center;
    }
    .ring-card {
      position: relative;
      width: 210px;
      height: 210px;
    }
    .ring-card svg { transform: rotate(-90deg); }
    .ring-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
    }
    .ring-text strong {
      display: block;
      font-size: 44px;
      line-height: 1;
      font-weight: 900;
    }
    .ring-text span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }
    .modules {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .outline-panel {
      margin-top: 16px;
      border-radius: 32px;
      padding: 20px;
    }
    .outline-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
    }
    .outline-title {
      font-size: 24px;
      font-weight: 900;
    }
    .outline-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      font-weight: 700;
      max-width: 880px;
    }
    .outline-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }
    .outline-chapter {
      border-radius: 26px;
      padding: 18px;
      background: rgba(255,255,255,0.82);
      border: 1px solid var(--border);
    }
    .outline-chapter-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }
    .outline-chapter h3 {
      font-size: 20px;
      font-weight: 900;
    }
    .outline-count {
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--green-soft);
      color: var(--green-deep);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .outline-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .outline-item {
      width: 100%;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #fbffff;
      padding: 14px;
      text-align: left;
    }
    .outline-item-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .outline-item-label {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.55;
    }
    .outline-status {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .outline-status.exact {
      background: var(--green-soft);
      color: var(--green-deep);
    }
    .outline-status.mapped {
      background: var(--pink-soft);
      color: var(--pink-deep);
    }
    .outline-status.missing {
      background: #fff5e8;
      color: #c77a25;
    }
    .outline-meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      font-weight: 700;
    }
    .module-card {
      border-radius: 28px;
      padding: 20px;
      text-align: left;
      transition: transform .2s ease;
    }
    .module-card:hover { transform: translateY(-3px); }
    .module-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .module-label {
      display: inline-block;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
      color: var(--green-deep);
      background: var(--green-soft);
    }
    .module-card h3 {
      margin-top: 14px;
      font-size: 22px;
      font-weight: 900;
    }
    .module-card p {
      margin-top: 6px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      min-height: 48px;
    }
    .module-count {
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      padding: 10px 12px;
      text-align: right;
    }
    .module-count strong {
      display: block;
      font-size: 28px;
      font-weight: 900;
    }
    .module-count span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
    }
    .bar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      font-size: 13px;
      font-weight: 900;
      color: var(--muted);
    }
    .bar {
      height: 12px;
      margin-top: 8px;
      border-radius: 999px;
      background: rgba(134, 196, 200, 0.18);
      overflow: hidden;
    }
    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--pink));
      transition: width .25s ease;
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 16px;
    }
    .sidebar {
      border-radius: 28px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 124px);
      max-height: calc(100vh - 124px);
    }
    .side-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .side-title {
      font-size: 22px;
      font-weight: 900;
    }
    .side-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .icon-btn, .ghost-btn, .export-btn, .secondary-btn {
      border-radius: 18px;
      min-height: 46px;
      padding: 0 16px;
      font-size: 14px;
      font-weight: 900;
    }
    .icon-btn { width: 46px; padding: 0; background: #eef8fa; }
    .ghost-btn { background: var(--green-soft); color: var(--green-deep); }
    .export-btn { background: linear-gradient(135deg, var(--pink), #f6cde0); color: #7a3658; }
    .secondary-btn { background: var(--blue-soft); color: var(--green-deep); }
    .management-wrap {
      display: grid;
      gap: 16px;
    }
    .management-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 16px;
    }
    .management-card {
      border-radius: 28px;
      padding: 20px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: var(--shadow);
    }
    .management-title {
      font-size: 24px;
      font-weight: 900;
    }
    .management-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
      font-weight: 700;
    }
    .management-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .code-textarea {
      width: 100%;
      min-height: 180px;
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #fbffff;
      padding: 14px;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      line-height: 1.7;
      resize: vertical;
      outline: none;
    }
    .status-box {
      margin-top: 14px;
      border-radius: 18px;
      background: #f5fbfc;
      border: 1px solid var(--border);
      padding: 14px;
      color: #426271;
      font-size: 14px;
      line-height: 1.7;
      font-weight: 700;
    }
    .code-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 14px;
    }
    .code-table th, .code-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    .code-table th {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .08em;
      background: #f0fbfb;
    }
    .code-table tr:last-child td { border-bottom: 0; }
    .tiny-chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 900;
      background: var(--green-soft);
      color: var(--green-deep);
    }
    .tiny-chip.warn {
      background: var(--pink-soft);
      color: var(--pink-deep);
    }
    .tiny-chip.info {
      background: var(--blue-soft);
      color: var(--green-deep);
    }
    .readonly-banner {
      margin-top: 14px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(241,251,253,0.96), rgba(255,241,247,0.94), rgba(255,255,255,0.98));
      border: 1px solid var(--border);
      padding: 16px 18px;
    }
    .readonly-banner strong {
      display: block;
      font-size: 16px;
      font-weight: 900;
    }
    .readonly-banner p {
      margin-top: 8px;
      color: #426271;
      font-size: 14px;
      line-height: 1.75;
      font-weight: 700;
    }
    .parent-report-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .parent-stat {
      border-radius: 22px;
      padding: 16px;
      background: rgba(255,255,255,0.76);
      border: 1px solid var(--border);
    }
    .parent-stat .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
    }
    .parent-stat .value {
      margin-top: 10px;
      font-size: 28px;
      font-weight: 900;
    }
    .search-wrap {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: #f5fbfc;
      padding: 12px 14px;
    }
    .search-wrap input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
    }
    .tree {
      flex: 1;
      margin-top: 14px;
      overflow: auto;
      padding-right: 4px;
    }
    .tree::-webkit-scrollbar { width: 10px; }
    .tree::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(112, 178, 181, 0.32);
    }
    .cat {
      margin-bottom: 10px;
      border-radius: 24px;
      background: rgba(255,255,255,0.88);
      padding: 10px;
    }
    .cat-btn, .sub-btn {
      display: flex;
      width: 100%;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 16px;
      text-align: left;
      font-weight: 900;
    }
    .cat-btn:hover, .sub-btn:hover { background: var(--green-soft); }
    .cat-title { font-size: 15px; }
    .cat-meta, .sub-meta {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
    }
    .sub-wrap {
      margin-top: 8px;
      border-radius: 18px;
      background: #f5fbfc;
      padding: 8px;
    }
    .sub-title { font-size: 14px; font-weight: 900; }
    .topic-list { margin-top: 8px; }
    .topic {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
      margin-bottom: 8px;
      border: 1px solid transparent;
      border-radius: 18px;
      background: #fff;
      padding: 12px;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }
    .topic:hover { transform: translateY(-1px); }
    .topic.active {
      border-color: rgba(201, 107, 145, 0.38);
      background: rgba(255, 241, 247, 0.9);
    }
    .topic input {
      margin-top: 4px;
      width: 18px;
      height: 18px;
      accent-color: var(--green);
    }
    .topic-btn {
      text-align: left;
      min-width: 0;
    }
    .topic-name {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.55;
    }
    .topic-grade {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .tick {
      margin-top: 2px;
      color: var(--pink-deep);
      font-size: 18px;
      font-weight: 900;
      min-width: 18px;
      text-align: center;
    }
    .detail-main {
      min-width: 0;
    }
    .detail-toolbar {
      border-radius: 28px;
      padding: 18px;
    }
    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar-divider {
      width: 1px;
      height: 40px;
      background: var(--border);
    }
    .current-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .current-topic {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 900;
    }
    .content-wrap {
      margin-top: 16px;
      border-radius: 28px;
      padding: 14px;
      content-visibility: auto;
      contain-intrinsic-size: 760px;
    }
    .mode-tabs {
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      border-radius: 18px;
      background: #eef8fa;
    }
    .mode-tab {
      border-radius: 14px;
      min-height: 40px;
      padding: 0 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }
    .mode-tab.active {
      background: #fff;
      color: var(--pink-deep);
      box-shadow: 0 8px 18px rgba(201, 107, 145, 0.12);
    }
    iframe {
      display: block;
      width: 100%;
      height: 72vh;
      border: 0;
      border-radius: 22px;
      background: white;
    }
    .practice-wrap, .report-wrap, .wrongbook-wrap {
      display: grid;
      gap: 16px;
    }
    .practice-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .practice-title {
      font-size: 24px;
      font-weight: 900;
    }
    .practice-sub {

    function parseKnowledgeCsv(csvText) {
      return csvText.trim().split(/\r?\n/).slice(1).map((line, index) => {
        const [category, subcategory, topic, grade] = line.split(',');
        return {
          id: `${category}__${subcategory}__${topic}__${index}`,
          category,
          subcategory,
          topic,
          grade,
          file: `k-${String(index + 1).padStart(3, '0')}.html`
        };
      });
    }

    function isStoredAccessValid() {
      if (!state.accessProfile?.hash) return false;
      const license = licenseRegistry.get(state.accessProfile.hash);
      if (!license || state.revokedHashes.has(state.accessProfile.hash) || isLicenseExpired(license)) {
        localStorage.removeItem(UNLOCK_KEY);
        localStorage.removeItem(ACCESS_KEY);
        localStorage.removeItem(ACTIVE_CODE_HASH_KEY);
        state.accessProfile = null;
        return false;
      }
      if (state.accessProfile.expiresAt !== (license.expiresAt || null)) {
        state.accessProfile = {
          ...state.accessProfile,
          tier: license.tier,
          label: license.label || state.accessProfile.label,
          expiresAt: license.expiresAt || null
        };
        localStorage.setItem(ACCESS_KEY, JSON.stringify(state.accessProfile));
      }
      return true;
    }

    function safeLoad(key, fallback) {
      try {

        return value ? JSON.parse(value) : fallback;

    }

    async function attemptUnlock() {
      const code = normalizeCodeInput(unlockInput.value);
      if (!code) {
        unlockStatus.textContent = '请先输入授权码。';
        unlockStatus.className = 'unlock-status error';
        return;
      }
      const matched = await resolveLicenseCode(code);
      const hash = matched?.hash;
      const license = matched?.license;
      if (!license) {
        unlockStatus.textContent = '授权码无效，请检查后重新输入。';
        unlockStatus.className = 'unlock-status error';
        return;
      }
      if (state.revokedHashes.has(hash)) {
        unlockStatus.textContent = '这个授权码已被停用，请联系家长或管理员更换。';
        unlockStatus.className = 'unlock-status error';
        return;
      }
      if (isLicenseExpired(license)) {
        unlockStatus.textContent = `这个授权码已过期（截止 ${formatExpiry(license.expiresAt)}），请联系家长或管理员领取新卡密。`;
        unlockStatus.className = 'unlock-status error';
        return;
      }
      state.accessProfile = {
        tier: license.tier,
        hash,
        label: license.label || (license.tier === 'parent' ? '家长查看码' : '学生学习码'),
        unlockedAt: new Date().toISOString(),
        expiresAt: license.expiresAt || null
      };
      if (license.tier === 'parent') {
        state.view = 'home';
        state.mode = 'report';
      }
      if (license.tier === 'student' && state.mode === 'management') {
        state.mode = 'lesson';
      }
      localStorage.setItem(ACTIVE_CODE_HASH_KEY, JSON.stringify(hash));
      localStorage.setItem(ACCESS_KEY, JSON.stringify(state.accessProfile));
      if (license) {
        localStorage.setItem(UNLOCK_KEY, JSON.stringify(true));
        unlockStatus.textContent = license.tier === 'parent'
          ? '家长端解锁成功，正在进入学习报告界面…'
          : matched.corrected
            ? '学生端解锁成功，已自动识别易混字符，正在进入学习空间…'
            : '学生端解锁成功，正在进入学习空间…';
        unlockStatus.className = 'unlock-status ok';
        unlockShell.classList.add('hidden');
        mainApp.classList.remove('hidden');
        initializeExpansion();
        render();
      }
    }

    function normalizeCodeInput(value) {
      const compact = String(value || '')
        .trim()
        .toUpperCase()
        .replace(/[－—–\s]/g, '')
        .replace(/[^A-Z0-9]/g, '');
      if (/^[A-Z0-9]{15}$/.test(compact)) {
        return `${compact.slice(0, 3)}-${compact.slice(3, 7)}-${compact.slice(7, 11)}-${compact.slice(11, 15)}`;
      }
      return String(value || '')
        .trim()
        .toUpperCase()
        .replace(/[－—–]/g, '-')
        .replace(/\s+/g, '');
    }

    async function resolveLicenseCode(code) {
      for (const candidate of buildCodeCandidates(code)) {
        const hash = await sha256(candidate);
        const license = licenseRegistry.get(hash);
        if (license) {
          return { hash, license, code: candidate, corrected: candidate !== code };
        }
      }
      return null;
    }

    function buildCodeCandidates(code) {
      const confusable = {
        O: ['0'],
        0: ['O'],
        I: ['1', 'L'],
        L: ['1', 'I'],
        1: ['I', 'L'],
        Z: ['7', '2'],
        7: ['Z'],
        2: ['Z'],
        S: ['5'],
        5: ['S'],
        B: ['8'],
        8: ['B'],
        G: ['6', '9'],
        6: ['G'],
        9: ['G'],
        A: ['4'],
        4: ['A']
      };
      const candidates = new Set([code]);
      const replaceAt = (base, index, replacement) => `${base.slice(0, index)}${replacement}${base.slice(index + 1)}`;

      for (let distance = 1; distance <= 2; distance++) {
        const snapshot = Array.from(candidates);
        for (const base of snapshot) {
          const changed = [];
          for (let i = 0; i < base.length; i++) {
            if (base[i] !== code[i]) changed.push(i);
          }
          if (changed.length !== distance - 1) continue;
          for (let i = 0; i < base.length; i++) {
            if (changed.includes(i)) continue;
            const replacements = confusable[base[i]];
            if (!replacements) continue;
            for (const replacement of replacements) {
              candidates.add(replaceAt(base, i, replacement));
              if (candidates.size >= 2500) return Array.from(candidates);
            }
          }
        }
      }
      return Array.from(candidates);
    }

    async function sha256(text) {
      const bytes = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest('SHA-256', bytes);
      return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function isLicenseExpired(license) {
      if (!license?.expiresAt) return false;
      const expiresMs = new Date(license.expiresAt).getTime();
      return Number.isFinite(expiresMs) ? Date.now() > expiresMs : false;
    }

    function formatExpiry(expiresAt) {
      if (!expiresAt) return '长期有效';
      const date = new Date(expiresAt);
      if (Number.isNaN(date.getTime())) return expiresAt;
      return date.toLocaleString('zh-CN', { hour12: false });
    }

    function initializeExpansion() {
      const tree = buildTree(knowledgeItems);
      tree.forEach((category, categoryIndex) => {
        if (state.expandedCategories[category.name] === undefined) {
          state.expandedCategories[category.name] = categoryIndex === 0;
        }
        category.subcategories.forEach((subcategory, subIndex) => {
          const key = `${category.name}__${subcategory.name}`;
          if (state.expandedSubcategories[key] === undefined) {
            state.expandedSubcategories[key] = categoryIndex === 0 && subIndex === 0;
          }
        });
      });
    }

    function buildTree(items) {
      const map = new Map();
      items.forEach(item => {
        if (!map.has(item.category)) {
          map.set(item.category, { name: item.category, subcategories: new Map() });
        }
        const cat = map.get(item.category);
        if (!cat.subcategories.has(item.subcategory)) {
          cat.subcategories.set(item.subcategory, { name: item.subcategory, topics: [] });
        }
        cat.subcategories.get(item.subcategory).topics.push(item);
      });
      return Array.from(map.values()).map(category => ({
        name: category.name,
        subcategories: Array.from(category.subcategories.values())
      }));
    }

      return knowledgeItems.find(item => item.id === state.activeTopicId) || knowledgeItems[0] || null;

      const topic = knowledgeItems.find(item => item.id === id);
      if (!topic) return;
      state.activeTopicId = topic.id;
      state.mode = mode;
      state.expandedCategories[topic.category] = true;

    function getCategoryStats() {

    function normalizeOutlineText(text) {
      return String(text || '')
        .replace(/[“”"']/g, '')
        .replace(/[《》]/g, '')
        .replace(/[———-]/g, '')
        .replace(/[、，,。！？：:（）()]/g, '')
        .replace(/\s+/g, '')
        .toLowerCase();
    }

    function findOutlineMatch(label) {
      const normalizedLabel = normalizeOutlineText(label);
      const exact = knowledgeItems.find(item => normalizeOutlineText(item.topic) === normalizedLabel);
      if (exact) return { status: 'exact', item: exact, note: `已按目录原样收录：${exact.topic}` };

      const prefix = label.match(/^(\d+\.\d+)/)?.[1] || '';
      const candidates = knowledgeItems.filter(item => {
        if (prefix && item.topic.startsWith(prefix)) return true;
        return normalizeOutlineText(item.topic).includes(normalizedLabel) || normalizedLabel.includes(normalizeOutlineText(item.topic));
      });

      if (candidates.length) {
        return {
          status: 'mapped',
          item: candidates[0],
          note: `已拆分成 ${candidates.length} 个更细讲义点`,
          sample: candidates.slice(0, 3).map(item => item.topic)
        };
      }

      return { status: 'missing', item: null, note: '当前未找到对应讲义页' };
    }

    function renderRing(value, total) {

      const dashOffset = circumference * (1 - ratio);
      return `
        <div class="ring-card">
          <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
            <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="rgba(143, 222, 215, 0.26)" stroke-width="${stroke}"></circle>
            <circle
              cx="${size/2}"
              cy="${size/2}"
              r="${radius}"
              fill="none"
              stroke="url(#ringGradient)"
              stroke-width="${stroke}"
              stroke-linecap="round"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${dashOffset}"
            ></circle>
            <defs>
              <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#8fded7"></stop>

      if (state.mode === 'report') return renderReport(activeTopic);
      if (state.mode === 'variant') return renderWrongbook(activeTopic, true);
      return renderWrongbook(activeTopic, false);
    }

    function getLessonReadText() {
      const lessonFrame = document.getElementById('lesson-frame');
      const doc = lessonFrame?.contentDocument || lessonFrame?.contentWindow?.document;
      if (!doc) return '';
      return Array.from(doc.querySelectorAll('[data-read]'))
        .map(el => el.innerText.trim())
        .filter(Boolean)
        .join('。')
        .replace(/\s+/g, ' ')
        .slice(0, 1100);
    }

    let lessonAudioPlayer = null;
    let lessonAudioChunks = [];
    let lessonAudioIndex = 0;
    let lessonAudioProviderIndex = 0;
    let lessonAudioPlaying = false;
    let speechEngineUnlocked = false;
    let preferNativeSpeech = true;

    function getChineseVoice() {
      if (!('speechSynthesis' in window)) return null;
      const voices = window.speechSynthesis.getVoices();
      const chineseVoices = voices.filter(voice => /zh|Chinese|中文|普通话|Mandarin/i.test(`${voice.lang} ${voice.name}`));
      return chineseVoices.find(voice => /xiaoxiao|xiaoyi|huihui|yaoyao|hanhan|tingting|xiaobei|xiaoni|female|女/i.test(`${voice.name} ${voice.lang}`))
        || chineseVoices[0]
        || null;
    }

    function canUseNativeSpeech() {
      return 'speechSynthesis' in window && typeof SpeechSynthesisUtterance !== 'undefined';
    }

    function unlockSpeechEngine() {
      if (!canUseNativeSpeech() || speechEngineUnlocked) return;
      try {
        const utterance = new SpeechSynthesisUtterance(' ');
        utterance.volume = 0;
        utterance.lang = 'zh-CN';
        utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
        speechEngineUnlocked = true;
      } catch (error) {}
    }

    ['touchstart', 'click'].forEach(eventName => {
      document.addEventListener(eventName, unlockSpeechEngine, { once: true, passive: true });
    });

    if (canUseNativeSpeech()) {
      window.speechSynthesis.onvoiceschanged = getChineseVoice;
    }

    function splitLessonText(text) {
      const parts = (String(text || '').replace(/\s+/g, ' ').match(/[^。！？；;!?]+[。！？；;!?]?/g) || [])
        .map(part => part.trim())
        .filter(Boolean);
      const chunks = [];
      let current = '';
      parts.forEach(part => {
        if ((current + part).length > 70 && current) {
          chunks.push(current);
          current = part;
        } else {
          current += part;
        }
      });
      if (current) chunks.push(current);
      const safeChunks = [];
      chunks.forEach(chunk => {
        if (chunk.length <= 90) {
          safeChunks.push(chunk);
          return;
        }
        for (let i = 0; i < chunk.length; i += 70) safeChunks.push(chunk.slice(i, i + 70));
      });
      return safeChunks;
    }

    function ttsUrl(text, providerIndex = 0) {
      const encoded = encodeURIComponent(text);
      if (providerIndex === 1) {
        return `https://dict.youdao.com/dictvoice?audio=${encoded}&le=zh`;
      }
      return `https://fanyi.baidu.com/gettts?lan=zh&text=${encoded}&spd=5&source=web`;
    }

    function getCurrentLessonAudioUrl() {
      const topic = getActiveTopic();
      if (!topic?.file) return '';
      return `./audio/${topic.file.replace(/\.html$/i, '.mp3')}?v=${AUDIO_VERSION}`;
    }

    function setLessonAudioStatus(message) {
      const panel = document.getElementById('lesson-audio-panel');
      const status = document.getElementById('lesson-audio-status');
      if (panel) panel.style.display = 'block';
      if (status) status.textContent = message;
    }

    function getVisibleLessonAudioPlayer() {
      const audio = document.getElementById('lesson-audio-control');
      if (audio) return audio;
      if (!lessonAudioPlayer) {
        lessonAudioPlayer = new Audio();
        lessonAudioPlayer.preload = 'auto';
        lessonAudioPlayer.setAttribute('playsinline', 'true');
      }
      return lessonAudioPlayer;
    }

    function stopRemoteLessonAudio() {
      lessonAudioPlaying = false;
      lessonAudioChunks = [];
      lessonAudioIndex = 0;
      lessonAudioProviderIndex = 0;
      const visibleAudio = document.getElementById('lesson-audio-control');
      [lessonAudioPlayer, visibleAudio].filter(Boolean).forEach(audio => {
        audio.pause();
        audio.removeAttribute('src');
        audio.load();
      });
    }

    function playNextLessonAudioChunk() {
      if (!lessonAudioPlaying || !lessonAudioChunks.length) return;
      if (lessonAudioIndex >= lessonAudioChunks.length) {
        stopRemoteLessonAudio();
        return;
      }
      lessonAudioPlayer = getVisibleLessonAudioPlayer();
      lessonAudioPlayer.onended = () => {
        lessonAudioProviderIndex = 0;
        lessonAudioIndex += 1;
        playNextLessonAudioChunk();
      };
      lessonAudioPlayer.onerror = () => {
        if (/^(?:\.\/)?audio\/.+\.mp3/i.test(lessonAudioChunks[lessonAudioIndex])) {
          lessonAudioChunks = splitLessonText(getLessonReadText());
          lessonAudioIndex = 0;
          lessonAudioProviderIndex = 0;
          setLessonAudioStatus('本地音频暂时没加载成功，正在切换备用朗读音频。');
          playNextLessonAudioChunk();
          return;
        }
        if (lessonAudioProviderIndex === 0) {
          lessonAudioProviderIndex = 1;
          playNextLessonAudioChunk();
          return;
        }
        lessonAudioProviderIndex = 0;
        lessonAudioIndex += 1;
        playNextLessonAudioChunk();
      };
      const currentChunk = lessonAudioChunks[lessonAudioIndex];
      lessonAudioPlayer.src = /^(?:\.\/)?audio\/.+\.mp3/i.test(currentChunk)
        ? currentChunk
        : ttsUrl(currentChunk, lessonAudioProviderIndex);
      lessonAudioPlayer.load();
      const playPromise = lessonAudioPlayer.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(() => {
          setLessonAudioStatus('手机拦截了自动播放。请点下面播放器左侧的播放键，讲义就会读出来。');
        });
      }
    }

    function playRemoteLessonAudio(text, audioUrl = '') {
      stopRemoteLessonAudio();
      lessonAudioChunks = audioUrl ? [audioUrl] : splitLessonText(text);
      if (!lessonAudioChunks.length) {
        alert('讲义还在加载，稍等一下再点朗读。');
        return;
      }
      setLessonAudioStatus('正在准备讲义音频。如果没有自动出声，请点下面播放器左侧的播放键。');
      lessonAudioPlaying = true;
      playNextLessonAudioChunk();
    }

    function speakWithNativeSpeech(text, fallbackAudioUrl = '') {
      if (!canUseNativeSpeech()) return false;
      try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.88;
        utterance.pitch = 1.02;
        const voice = getChineseVoice();
        if (voice) utterance.voice = voice;
        utterance.onerror = () => {
          preferNativeSpeech = false;
          playRemoteLessonAudio(text, fallbackAudioUrl || getCurrentLessonAudioUrl());
        };
        window.speechSynthesis.speak(utterance);
        window.setTimeout(() => {
          if (window.speechSynthesis.paused) window.speechSynthesis.resume();
          if (!window.speechSynthesis.speaking && fallbackAudioUrl) {
            preferNativeSpeech = false;
            playRemoteLessonAudio(text, fallbackAudioUrl);
          }
        }, 260);
        return true;
      } catch (error) {
        return false;
      }
    }

    function speakLessonText(text, audioUrl = '') {
      const cleanText = String(text || '').replace(/\s+/g, ' ').trim();
      if (!cleanText) {
        alert('讲义还在加载，稍等一下再点朗读。');
        return;
      }
      stopRemoteLessonAudio();
      const localAudioUrl = audioUrl || getCurrentLessonAudioUrl();
      unlockSpeechEngine();
      if (preferNativeSpeech && speakWithNativeSpeech(cleanText, localAudioUrl)) {
        setLessonAudioStatus('正在使用手机原生语音朗读。如果没有声音，请点下面播放器播放真人感音频。');
        const audio = getVisibleLessonAudioPlayer();
        audio.src = localAudioUrl;
        audio.load();
        return;
      }
      if (localAudioUrl) {
        playRemoteLessonAudio(cleanText, localAudioUrl);
        return;
      }
      if (!canUseNativeSpeech()) {
        playRemoteLessonAudio(cleanText);
        return;
      }
      speakWithNativeSpeech(cleanText);
    }

    function speakCurrentLesson() {
      speakLessonText(getLessonReadText(), getCurrentLessonAudioUrl());
    }

    function stopLessonReading() {
      stopRemoteLessonAudio();
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();

      lessonFrame?.contentWindow?.postMessage({ type: 'lesson-sound-config', enabled: false }, '*');
    }

    window.speakLessonText = speakLessonText;
    window.stopLessonReading = stopLessonReading;

            <div class="choice-grid">
              ${question.options.map(option => {
                const letter = option.split('.')[0].trim();
                return `

      `;

    function gradeCurrentPaper(activeTopic) {
      const paper = getPracticePaper(activeTopic);
      const rows = [];
      let totalScore = 0;
      const total = paper.questions.reduce((sum, item) => sum + item.score, 0);
      const typeStats = {
        '选择题': { score: 0, total: 0, wrong: 0 },
        '填空题': { score: 0, total: 0, wrong: 0 },
        '解答题': { score: 0, total: 0, wrong: 0 }
      };

      paper.questions.forEach((question, idx) => {
        const raw = String(state.practiceAnswers[question.id] || '').trim();
        let earned = 0;
        let correct = false;

        if (question.type === 'choice') {
          correct = raw.toUpperCase() === question.answer.toUpperCase();
          earned = correct ? question.score : 0;
        } else if (question.type === 'fill') {
          const normalized = raw.replace(/\s+/g, '').toLowerCase();
          correct = question.answerText.some(item => normalized === String(item).replace(/\s+/g, '').toLowerCase());
          earned = correct ? question.score : 0;
        } else {
          const normalized = raw.toLowerCase();
          const hitCount = question.keywords.filter(keyword => normalized.includes(String(keyword).toLowerCase())).length;
          const ratio = question.keywords.length === 0 ? 0 : hitCount / question.keywords.length;
          earned = Math.round(question.score * Math.min(1, ratio));
          correct = earned === question.score;
        }

        totalScore += earned;
        typeStats[question.category].score += earned;
        typeStats[question.category].total += question.score;
        if (!correct) typeStats[question.category].wrong += 1;

        rows.push({
          no: idx + 1,
          prompt: question.prompt,
          skill: question.skill,
          category: question.category,
          max: question.score,
          earned,
          answer: raw || '未作答',
          correctAnswer: getCorrectAnswerText(question),
          explanation: getQuestionExplanation(question),
          correct,
          suggestion: correct
            ? '这一题完成得不错，继续保持。'
            : (question.type === 'solve'
              ? `建议回看“${question.skill}”的思路表达，补上关键步骤和数学语言。`
              : `建议重新练习“${question.skill}”这一类基础题。`)
        });
      });

      const lost = total - totalScore;
      const lostQuestions = rows.filter(item => item.earned < item.max);
      const focusSkills = lostQuestions.slice(0, 4).map(item => `${item.no}题：${item.skill}`);
      const weakCategories = Object.entries(typeStats)
        .sort((a, b) => {
          const rateA = a[1].total ? a[1].score / a[1].total : 1;
          const rateB = b[1].total ? b[1].score / b[1].total : 1;
          return rateA - rateB;
        })
        .map(([name]) => name);

      const report = {
        generatedAt: new Date().toLocaleString('zh-CN', { hour12: false }),
        paperTitle: paper.title,
        topic: activeTopic.topic,
        category: activeTopic.category,
        total,
        totalScore,
        lost,
        rate: total ? Math.round((totalScore / total) * 100) : 0,
        lostQuestionsCount: lostQuestions.length,
        focusSkills,
        rows,
        typeStats,
        classroomComment: buildClassroomComment(activeTopic, lostQuestions, weakCategories),
        suggestions: buildSuggestions(activeTopic, weakCategories, focusSkills),
        quote: buildQuote(total ? totalScore / total : 0)
      };
      return report;
    }

    function getCorrectAnswerText(question) {
      if (question.type === 'choice') {
        const matched = question.options?.find(option => option.split('.')[0].trim().toUpperCase() === question.answer.toUpperCase());
        return matched || question.answer;
      }
      if (question.type === 'fill') {
        return question.answerText?.[0] || '见解析';
      }
      return question.sample || '见解析中的参考步骤';
    }

    function getQuestionExplanation(question) {
      if (question.sample) return question.sample;
      const explanationMap = {
        '分数乘法': '分数乘法先确定单位1。求一个数的几分之几是多少，用乘法，并注意先约分。',
        '分数除法': '分数除法常用于单位1未知的问题。找到对应量和对应分率，再用对应量除以对应分率。',
        '比': '比的前项和后项可同时乘或除以同一个不为 0 的数；按比例分配先求总份数。',
        '百分数': '百分数表示一个数是另一个数的百分之几，通常先列除法，再化成百分数。',
        '位置方向': '确定位置需要方向和距离；返回路线的方向相反，距离不变。',
        '圆': '圆题先找半径或直径，再选择周长公式 C=2πr 或面积公式 S=πr²。',
        '扇形': '扇形是圆的一部分，由一条弧和经过弧两端的两条半径围成。',
        '统计图': '读统计图先看标题、总量、项目和百分比，结论必须来自图中数据。',
        '数与形': '数形结合要把图形变化转化成数列或算式规律。',
        '综合实践': '综合实践题重在过程表达：记录条件、说明方法、检查结果并反思。'
      };
      return explanationMap[question.skill] || '先回到教材定义，再看题目条件，把判断依据写清楚。';
    }

    function buildClassroomComment(activeTopic, lostQuestions, weakCategories) {
      if (!lostQuestions.length) {
        return `本次 ${activeTopic.category} 小测完成得很扎实，说明基础概念、基本运算和表达习惯都比较稳定。后续建议在保持正确率的前提下，继续提升做题速度和步骤书写的规范度。`;
      }
      const focus = weakCategories.slice(0, 2).join('、');
      const examples = lostQuestions.slice(0, 3).map(item => `${item.no}题（${item.skill}）`).join('，');
      return `本卷存在比较明显的薄弱环节，当前重点关注：${focus}。失分主要集中在 ${examples}。建议围绕同类题做一次讲评复盘，把概念、步骤和易错点重新梳理一遍。`;
    }

    function buildSuggestions(activeTopic, weakCategories, focusSkills) {
      const suggestions = [];
      if (weakCategories.includes('填空题')) {
        suggestions.push('重点围绕填空题做专项复盘，先把概念和计算结果写准，再训练速度。');
      }
      if (weakCategories.includes('解答题')) {
        suggestions.push('解答题要按考试格式写步骤，不跳步、不漏条件，先保住过程分。');
      }
      if (weakCategories.includes('选择题')) {
        suggestions.push('选择题不要只凭感觉，建议养成“先判断依据，再选答案”的习惯。');
      }
      if (focusSkills.length) {
        suggestions.push(`当天优先回看这些失分点：${focusSkills.join('；')}。`);
      }
      suggestions.push(`结合“${activeTopic.category}”这条主线，把同类知识点再做一轮 3 到 5 题的小练习。`);
      return suggestions.slice(0, 4);
    }

    function buildWrongbookEntries(activeTopic, report) {
      const paper = getPracticePaper(activeTopic);
      return report.rows
        .filter(item => item.earned < item.max)
        .map(item => {
          const question = paper.questions[item.no - 1];
          const variants = (variantBank[item.skill] || []).map((variant, index) => ({
            ...variant,
            localId: `${item.no}-${variant.id || index}`
          }));
          return {
            id: `${activeTopic.category}-${question.id}`,
            topic: activeTopic.topic,
            category: activeTopic.category,
            skill: item.skill,
            prompt: question.prompt,
            userAnswer: item.answer,
            correctAnswer: item.correctAnswer,
            explanation: item.explanation,
            score: `${item.earned}/${item.max}`,
            diagnosis: item.suggestion,
            textbookHint: buildTextbookHint(item.skill, activeTopic),
            variants
          };
        });
    }

    function buildTextbookHint(skill, activeTopic) {
      const hintMap = {
        '分数乘法': '先确定单位1，再判断是不是求一个数的几分之几。',
        '分数除法': '看到“已知几分之几是多少”，优先找对应量和对应分率。',
        '比': '比、分数、除法能互相转化，化简时前后项同步处理。',
        '百分数': '百分数本质是比较关系，先写除法，再化成百分数。',
        '位置方向': '方向角和距离要同时出现，观测点变化时方向也要反过来。',
        '圆': '先找半径或直径，再选择周长、面积或圆环公式。',
        '扇形': '抓住圆心角、半径和弧，想清它是圆的一部分。',
        '统计图': '先看标题、总量、项目和百分比，再做结论。',
        '数与形': '把图形层数、点数或面积变化写成数列规律。',
        '综合实践': '真实问题要有记录、解释、检查和反思。'
      };
      return `${activeTopic.category} · ${activeTopic.topic}：${hintMap[skill] || '先回到教材定义和例题，再做同类练习。'}`;
    }
    function buildQuote(rate) {
      if (rate >= 0.85) return '稳扎稳打，继续把会做的题做得更漂亮。';
      if (rate >= 0.6) return '基础已经搭起来了，下一步要把短板补成台阶。';
      return '先别着急，找准最薄弱的一环，一环一环补，进步会很明显。';
    }

    function getReportSkillStats(report) {
      const grouped = new Map();
      report.rows.forEach(row => {
        if (!grouped.has(row.skill)) {
          grouped.set(row.skill, { skill: row.skill, total: 0, earned: 0, lost: 0, wrong: 0, questions: [] });
        }
        const stat = grouped.get(row.skill);
        stat.total += row.max;
        stat.earned += row.earned;
        stat.lost += row.max - row.earned;
        if (row.earned < row.max) {
          stat.wrong += 1;
          stat.questions.push(row.no);
        }
      });
      return Array.from(grouped.values())
        .filter(stat => stat.lost > 0)
        .sort((a, b) => b.lost - a.lost || b.wrong - a.wrong);
    }

    function getSkillCause(skill) {
      const causes = {
        '分数乘法': '单位1和“求几分之几”关系容易混在一起，计算时约分意识还要加强。',
        '分数除法': '对应量、对应分率、单位1三者关系没有完全锁定，容易把乘除法方向写反。',
        '比': '化简比和按比例分配的总份数意识不够稳，前项后项同步变化容易漏掉。',
        '百分数': '百分数本质是比较关系，容易在“谁和谁比、谁是单位1”上判断不准。',
        '位置方向': '观测点变化后方向要相反，方向角和距离需要同时保留。',
        '圆': '半径、直径、周长、面积公式之间切换不够熟，容易把公式或单位写混。',
        '扇形': '对“扇形是圆的一部分”的结构理解还不够清楚，圆心角、半径和弧的关系要再看。',
        '统计图': '读图时容易只看百分比，忽略标题、总量和项目之间的对应关系。',
        '数与形': '图形规律还没有稳定转化成算式或数列，观察到表达之间需要多练。',
        '综合实践': '过程表达不够完整，条件、方法、检查和反思容易缺一块。'
      };
      return causes[skill] || '相关概念和同类题迁移还不够稳，需要回到教材定义重新梳理。';
    }

    function getAbilityDiagnosis(report) {
      const lostRows = report.rows.filter(row => row.earned < row.max);
      const solveLost = lostRows.filter(row => row.category === '解答题').length;
      const choiceLost = lostRows.filter(row => row.category === '选择题').length;
      const fillLost = lostRows.filter(row => row.category === '填空题').length;
      const points = [];
      if (choiceLost) points.push(`<strong>概念判断：</strong>选择题失分说明定义和关键词还没有完全自动化，做题时建议先圈出“单位1、方向、总量、公式”等核心词。`);
      if (fillLost) points.push(`<strong>计算与转化：</strong>填空题失分多半来自计算链条不够稳，尤其要检查约分、百分数互化、半径直径转换这类小步骤。`);
      if (solveLost) points.push(`<strong>规范表达：</strong>解答题失分说明思路可能会，但步骤写得还不够完整；建议每题写清条件、列式、计算和答语。`);
      if (!points.length) points.push(`<strong>综合表现：</strong>本次答题比较稳定，可以继续训练速度和更漂亮的步骤表达。`);
      points.push(`<strong>学习状态：</strong>${report.rate >= 85 ? '当前掌握度较好，可以做少量拔高题保持手感。' : report.rate >= 60 ? '基础已经有了，接下来把高频失分点集中练一轮，进步会很快。' : '先不要急着刷很多题，建议每天只抓 1 到 2 个薄弱点，稳稳补起来。'}`);
      return points;
    }

    function getParentActions(report) {
      const skillStats = getReportSkillStats(report);
      const topSkills = skillStats.slice(0, 3).map(item => item.skill).join('、') || '本单元核心概念';
      return [
        {
          title: '抓手1：错题本升级要求',
          body: `督促孩子整理错题时，不只写正确答案，还要补齐“错因、正确思路、同类题提醒”。重点围绕 ${topSkills} 做标记。`
        },
        {
          title: '抓手2：专项突破计划',
          body: `每天安排 10 到 15 分钟做同类小练，先做基础题保证准确率，再做 1 道稍有变化的题，训练迁移能力。`
        },
        {
          title: '抓手3：口头讲题复盘',
          body: '让孩子把一道错题讲给家长听：题目问什么、已知什么、为什么这样列式。讲得出来，才是真的更稳了。'
        }
      ];
    }

    function renderReportSkillLoss(report) {
      const stats = getReportSkillStats(report);
      if (!stats.length) return '<p class="doc-body">本次没有明显知识模块失分，基础掌握较稳。后续可以继续做少量变式题，保持题感。</p>';
      return `
        <ol class="doc-list">
          ${stats.map(stat => `
            <li>
              <strong>${escapeHtml(stat.skill)}：</strong>失分约 <strong>${Math.round((stat.lost / report.total) * 100)}%</strong>（涉及第 ${stat.questions.join('、')} 题）。
              <ul class="doc-sublist">
                <li><strong>主要原因：</strong>${escapeHtml(getSkillCause(stat.skill))}</li>
              </ul>
            </li>
          `).join('')}
        </ol>
      `;
    }

    function renderTypicalWrongDeepDive(report) {
      const wrongRows = report.rows.filter(row => row.earned < row.max).slice(0, 3);
      if (!wrongRows.length) {
        return '<p class="doc-body">本次没有典型错题需要深挖。可以从错题本里挑 1 到 2 道旧题做复查，防止遗忘。</p>';
      }
      return wrongRows.map(row => `
        <div class="wrong-deep-card">
          <div class="wrong-deep-title">${row.no}. 题目：${escapeHtml(row.prompt)}</div>
          <ul class="doc-list">
            <li><strong>错误答案：</strong>${escapeHtml(row.answer || '未作答')}（本题得分 ${row.earned}/${row.max}）</li>

            <li><strong>正确思路要点：</strong>${escapeHtml(row.explanation || '先回到教材定义，再看题目条件。')}</li>

          </ul>
        </div>

    }

    function renderReport(activeTopic) {
      const report = state.latestReport && state.latestReport.category === activeTopic.category
        ? state.latestReport
        : null;

      if (!report) {

          <div class="empty-state">

            ${renderTypicalWrongDeepDive(report)}

    function renderWrongbook(activeTopic, variantOnly = false) {
      const entries = state.wrongbook.filter(item => item.category === activeTopic.category);
      if (!entries.length) {
        return `
          <div class="empty-state">

              <h2>${variantOnly ? '还没有可练习的变式题' : '还没有错题本内容'}</h2>
              <p>${variantOnly ? '先完成同步练习并生成测评报告，系统会根据错题自动生成举一反三的变式练习。' : '先完成同步练习并提交，做错的题会自动沉淀到错题本。以后你就能围绕薄弱点反复练，还能直接做举一反三变式题。'}</p>
            </div>

        `;
      }

      return `

                <div class="wrongbook-title">${variantOnly ? '变式练习' : '错题本'}</div>
                <div class="wrongbook-sub">这里会自动记录你做错的题、失分原因、教材提示和举一反三练习，方便后续反复练薄弱点。</div>
              </div>
              <div class="meta-pill green">当前收录 ${entries.length} 题</div>
            </div>
          </div>
          <div class="wrongbook-grid">
            ${entries.map(renderWrongCard).join('')}
          </div>
        </div>
      `;
    }

    function getWrongEntryVariants(entry) {
      const current = Array.isArray(entry.variants) ? [...entry.variants] : [];
      const seen = new Set(current.map(item => item.id || item.prompt));
      (variantBank[entry.skill] || []).forEach((variant, index) => {
        const key = variant.id || variant.prompt;
        if (seen.has(key)) return;
        current.push({ ...variant, localId: `${entry.skill}-${variant.id || index}` });
        seen.add(key);
      });
      return current.slice(0, 3).map((variant, index) => ({
        ...variant,
        localId: variant.localId || `${entry.skill}-${index}`
      }));
    }

    function renderWrongCard(entry) {
      const variants = getWrongEntryVariants(entry);
      return `
        <div class="wrong-card">
          <div class="wrong-top">
            <div>
              <div class="wrong-title">${escapeHtml(entry.prompt)}</div>
              <div class="wrong-meta">知识点：${escapeHtml(entry.skill)} · 所属章节：${escapeHtml(entry.topic)} · 上次得分：${escapeHtml(entry.score)}</div>
            </div>
            <div class="wrong-chip">自动沉淀</div>
          </div>
          <div class="wrong-sections">
            <div class="wrong-box">

              <p>正确答案：${escapeHtml(entry.correctAnswer || '见解析')}</p>

            <div class="wrong-box">

            <h4>错误诊断</h4>
            <p>${escapeHtml(entry.diagnosis)}</p>
          </div>
          <div class="variant-list">
            ${variants.length ? variants.map(variant => renderVariantCard(entry, variant)).join('') : `<div class="wrong-box"><h4>举一反三</h4><p>这个知识点暂时没有录入变式题，后续可以继续扩充。</p></div>`}
          </div>
        </div>
      `;
    }

    function renderVariantCard(entry, variant) {
      const answerKey = `${entry.id}__${variant.localId}`;
      const current = state.variantAnswers[answerKey] || '';
      return `
        <div class="variant-card">
          <div class="variant-title">举一反三：${escapeHtml(variant.prompt)}</div>
          <div class="variant-actions">
            ${variant.type === 'choice'
              ? variant.options.map(option => {
                  const letter = option.split('.')[0].trim();
                  return `
                    <label class="choice-item" style="margin:0;">
                      <input type="radio" name="${escapeAttr(answerKey)}" value="${escapeAttr(letter)}" data-variant-answer="${escapeAttr(answerKey)}" ${current === letter ? 'checked' : ''} />
                      <span>${escapeHtml(option)}</span>
                    </label>
                  `;
                }).join('')
              : `<input class="variant-input" data-variant-text="${escapeAttr(answerKey)}" value="${escapeAttr(current)}" placeholder="把你的答案写在这里" />`
            }
          </div>
          <div class="variant-actions">
            <button class="secondary-btn" data-check-variant="${escapeAttr(answerKey)}" data-variant-meta="${escapeAttr(JSON.stringify({
              type: variant.type,
              answer: variant.answer || '',
              answerText: variant.answerText || [],
              keywords: variant.keywords || [],
              explanation: variant.explanation || ''
            }))}">检查这题</button>
          </div>
          <div class="variant-result" id="variant-result-${escapeAttr(answerKey)}">${state.variantAnswers[`result:${answerKey}`] ? escapeHtml(state.variantAnswers[`result:${answerKey}`]) : '完成后点“检查这题”，系统会告诉你这道变式题掌握得怎么样。'}</div>
        </div>
      `;
    }

    function percent(stat) {

    function renderCategory(category) {
      const categoryOpen = !!state.expandedCategories[category.name];
      const categoryTotal = category.subcategories.reduce((sum, sub) => sum + sub.topics.length, 0);
      const categoryDone = category.subcategories.reduce((sum, sub) => sum + sub.topics.filter(item => state.completed.has(item.id)).length, 0);
      return `

    function renderSubcategory(categoryName, subcategory) {
      const key = `${categoryName}__${subcategory.name}`;
      const subOpen = !!state.expandedSubcategories[key];

    function countCompletedInCategory(categoryName) {

    function countCompletedInSubcategory(key) {
      const [categoryName, subcategoryName] = key.split('__');
      const items = knowledgeItems.filter(item => item.category === categoryName && item.subcategory === subcategoryName);
      return { completed: items.filter(item => state.completed.has(item.id)).length, total: items.length };

    function refreshCompletionUi() {
      totalProgressPill.textContent = `已学 ${state.completed.size} / ${knowledgeItems.length}`;

    function bindDetailEvents() {
      const backBtn = document.getElementById('back-home-btn');
      if (backBtn) backBtn.onclick = () => { state.view = 'home'; render(); };

      const exportBtn = document.getElementById('export-btn');
      if (exportBtn) exportBtn.onclick = exportUncheckedTopics;

      const toggleLessonSoundBtn = document.getElementById('toggle-lesson-sound-btn');
      const readLessonBtn = document.getElementById('read-lesson-btn');
      const stopLessonSoundBtn = document.getElementById('stop-lesson-sound-btn');
      const lessonFrame = document.getElementById('lesson-frame');
      const syncLessonSoundConfig = () => {
        lessonFrame?.contentWindow?.postMessage({
          type: 'lesson-sound-config',
          enabled: state.lessonSoundEnabled
        }, '*');
      };
      if (toggleLessonSoundBtn) {
        toggleLessonSoundBtn.onclick = () => {
          state.lessonSoundEnabled = !state.lessonSoundEnabled;
          syncLessonSoundConfig();
          render();
        };
      }
      if (readLessonBtn) readLessonBtn.onclick = speakCurrentLesson;
      if (stopLessonSoundBtn) stopLessonSoundBtn.onclick = stopLessonReading;
      if (lessonFrame) {
        lessonFrame.addEventListener('load', () => {
          syncLessonSoundConfig();
          window.setTimeout(syncLessonSoundConfig, 300);
        });
      }

      const readOnly = state.accessProfile?.tier === 'parent';

      detailView.querySelectorAll('[data-mode]').forEach(button => {
        button.onclick = () => {
          state.mode = button.getAttribute('data-mode');
          if (readOnly && state.mode === 'practice') state.mode = 'report';
          render();
        };
      });

      const openMobileBtn = document.getElementById('open-mobile-menu');
      if (openMobileBtn) openMobileBtn.onclick = () => {
        state.mobileSidebarOpen = true;
        render();
      };

      const closeMobileBtn = document.getElementById('close-mobile-menu');
      if (closeMobileBtn) closeMobileBtn.onclick = () => {
        state.mobileSidebarOpen = false;
        render();
      };

      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.oninput = event => {
          state.search = event.target.value;
          window.clearTimeout(searchRenderTimer);
          searchRenderTimer = window.setTimeout(render, 140);
        };
      }
      const mobileSearchInput = document.getElementById('mobile-search-input');
      if (mobileSearchInput) {
        mobileSearchInput.oninput = event => {
          state.search = event.target.value;
          window.clearTimeout(searchRenderTimer);
          searchRenderTimer = window.setTimeout(render, 140);
        };
      }

      detailView.querySelectorAll('[data-toggle-category]').forEach(button => {
        button.onclick = () => {
          const key = button.getAttribute('data-toggle-category');
          const willOpen = !state.expandedCategories[key];
          state.expandedCategories[key] = willOpen;
          if (willOpen) {
            const first = firstTopicInCategory(key);
            focusTopic(first?.id);
          }
          render();
        };
      });
      detailView.querySelectorAll('[data-toggle-subcategory]').forEach(button => {
        button.onclick = () => {
          const key = button.getAttribute('data-toggle-subcategory');
          const willOpen = !state.expandedSubcategories[key];
          state.expandedSubcategories[key] = willOpen;
          if (willOpen) {
            const first = firstTopicInSubcategory(key);
            focusTopic(first?.id);
          }
          render();
        };
      });
      detailView.querySelectorAll('[data-select-topic]').forEach(button => {
        button.onclick = () => {
          const id = button.getAttribute('data-select-topic');
          const changedTopic = state.activeTopicId !== id;
          const fromMobileDrawer = !!button.closest('.mobile-drawer');
          focusTopic(id);
          saveState();
          if (fromMobileDrawer) {
            render();
            return;
          }
          refreshActiveTopicUi();
          if (changedTopic) refreshDetailContentOnly();
        };
      });
      detailView.querySelectorAll('[data-toggle-topic]').forEach(input => {
        input.onchange = () => {
          if (readOnly) return;
          const id = input.getAttribute('data-toggle-topic');
          const changedTopic = state.activeTopicId !== id;
          const fromMobileDrawer = !!input.closest('.mobile-drawer');
          focusTopic(id);
          if (state.completed.has(id)) state.completed.delete(id);
          else state.completed.add(id);
          saveState();
          refreshCompletionUi();
          refreshActiveTopicUi();
          if (changedTopic || fromMobileDrawer) {
            if (fromMobileDrawer) {
              render();
            } else {
              refreshDetailContentOnly();
            }
          }
        };
      });

      detailView.querySelectorAll('[data-practice-answer]').forEach(input => {
        input.onchange = () => {
          state.practiceAnswers[input.getAttribute('data-practice-answer')] = input.value;
          saveState();
        };
      });
      detailView.querySelectorAll('[data-practice-text]').forEach(textarea => {
        textarea.oninput = () => {
          state.practiceAnswers[textarea.getAttribute('data-practice-text')] = textarea.value;
          saveState();
        };
      });
      const clearPracticeBtn = document.getElementById('clear-practice-btn');
      if (clearPracticeBtn) {
        clearPracticeBtn.onclick = () => {
          const activeTopic = getActiveTopic();
          const paper = getPracticePaper(activeTopic);
          paper.questions.forEach(question => { delete state.practiceAnswers[question.id]; });
          state.latestReport = null;
          render();
        };
      }
      const submitPracticeBtn = document.getElementById('submit-practice-btn');
      if (submitPracticeBtn) {
        submitPracticeBtn.onclick = () => {
          const activeTopic = getActiveTopic();
          state.latestReport = gradeCurrentPaper(activeTopic);
          mergeWrongbook(buildWrongbookEntries(activeTopic, state.latestReport));
          state.mode = 'report';
          render();
        };
      }

      const managementInput = document.getElementById('management-bulk-input');
      if (managementInput) {
        managementInput.oninput = event => {
          state.managementBulkInput = event.target.value;
          saveState();
        };
      }
      const bulkRevokeBtn = document.getElementById('bulk-revoke-btn');
      if (bulkRevokeBtn) bulkRevokeBtn.onclick = () => applyBulkCodeStatus('revoke');
      const bulkRestoreBtn = document.getElementById('bulk-restore-btn');
      if (bulkRestoreBtn) bulkRestoreBtn.onclick = () => applyBulkCodeStatus('restore');
      const clearManagementBtn = document.getElementById('clear-management-input-btn');
      if (clearManagementBtn) clearManagementBtn.onclick = () => {
        state.managementBulkInput = '';
        state.managementStatus = '已清空输入框。';
        render();
      };
      const exportRevokedBtn = document.getElementById('export-revoked-btn');
      if (exportRevokedBtn) exportRevokedBtn.onclick = exportRevokedList;
      const importRevokedBtn = document.getElementById('import-revoked-btn');
      const importRevokedFile = document.getElementById('import-revoked-file');
      if (importRevokedBtn && importRevokedFile) {
        importRevokedBtn.onclick = () => importRevokedFile.click();
        importRevokedFile.onchange = event => importRevokedList(event.target.files?.[0]);
      }

      detailView.querySelectorAll('[data-variant-answer]').forEach(input => {
        input.onchange = () => {
          state.variantAnswers[input.getAttribute('data-variant-answer')] = input.value;
          saveState();
        };
      });
      detailView.querySelectorAll('[data-variant-text]').forEach(input => {
        input.oninput = () => {
          state.variantAnswers[input.getAttribute('data-variant-text')] = input.value;
          saveState();
        };
      });
      detailView.querySelectorAll('[data-check-variant]').forEach(button => {
        button.onclick = () => {
          const key = button.getAttribute('data-check-variant');
          const meta = JSON.parse(button.getAttribute('data-variant-meta'));
          const answer = String(state.variantAnswers[key] || '').trim();
          const result = checkVariantAnswer(answer, meta);
          state.variantAnswers[`result:${key}`] = result;
          saveState();
          render();
        };
      });

      mobileOverlay.onclick = event => {
        if (event.target === mobileOverlay) {
          state.mobileSidebarOpen = false;
          render();
        }
      };
      mobileOverlay.querySelectorAll('[data-toggle-category]').forEach(button => {
        button.onclick = () => {
          const key = button.getAttribute('data-toggle-category');
          const willOpen = !state.expandedCategories[key];
          state.expandedCategories[key] = willOpen;
          if (willOpen) {
            const first = firstTopicInCategory(key);
            focusTopic(first?.id);
          }
          render();
        };
      });
      mobileOverlay.querySelectorAll('[data-toggle-subcategory]').forEach(button => {
        button.onclick = () => {
          const key = button.getAttribute('data-toggle-subcategory');
          const willOpen = !state.expandedSubcategories[key];
          state.expandedSubcategories[key] = willOpen;
          if (willOpen) {
            const first = firstTopicInSubcategory(key);
            focusTopic(first?.id);
          }
          render();
        };
      });
      mobileOverlay.querySelectorAll('[data-select-topic]').forEach(button => {
        button.onclick = () => {
          focusTopic(button.getAttribute('data-select-topic'));
          render();
        };
      });
      mobileOverlay.querySelectorAll('[data-toggle-topic]').forEach(input => {
        input.onchange = () => {
          if (readOnly) return;
          const id = input.getAttribute('data-toggle-topic');
          focusTopic(id);
          if (state.completed.has(id)) state.completed.delete(id);
          else state.completed.add(id);
          render();
        };
      });
    }

    function exportUncheckedTopics() {
      const unchecked = knowledgeItems.filter(item => !state.completed.has(item.id));
      const rows = ['分类,子分类,知识点名称,对应年级', ...unchecked.map(item => `${item.category},${item.subcategory},${item.topic},${item.grade}`)];
      const blob = new Blob(['\ufeff' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = '未勾选知识点.csv';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function mergeWrongbook(entries) {
      const map = new Map(state.wrongbook.map(item => [item.id, item]));
      entries.forEach(entry => {
        map.set(entry.id, entry);
      });
      state.wrongbook = Array.from(map.values());
    }

    async function applyBulkCodeStatus(action) {
      const lines = String(state.managementBulkInput || '')
        .split(/\r?\n/)
        .map(item => item.trim().toUpperCase())
        .filter(Boolean);
      if (!lines.length) {
        state.managementStatus = '请先在输入框里每行写一个卡密。';
        render();
        return;
      }
      const resolved = [];
      const missing = [];
      for (const code of lines) {
        const hash = await sha256(code);
        if (licenseRegistry.has(hash)) resolved.push({ code, hash });
        else missing.push(code);
      }
      resolved.forEach(item => {
        if (action === 'revoke') state.revokedHashes.add(item.hash);
        else state.revokedHashes.delete(item.hash);
      });
      state.managementLog.unshift(`${new Date().toLocaleString('zh-CN', { hour12: false })} ${action === 'revoke' ? '停用' : '恢复'} ${resolved.length} 个卡密`);
      state.managementLog = state.managementLog.slice(0, 12);
      state.managementStatus = action === 'revoke'
        ? `已停用 ${resolved.length} 个有效卡密。${missing.length ? `未识别 ${missing.length} 个：${missing.join('、')}` : ''}`
        : `已恢复 ${resolved.length} 个有效卡密。${missing.length ? `未识别 ${missing.length} 个：${missing.join('、')}` : ''}`;
      if (state.accessProfile?.hash && state.revokedHashes.has(state.accessProfile.hash)) {
        state.managementStatus += ' 当前家长码已被停用，刷新后将需要重新输入可用卡密。';
      }
      render();
    }

    function exportRevokedList() {
      const payload = {
        exportedAt: new Date().toLocaleString('zh-CN', { hour12: false }),
        revokedHashes: Array.from(state.revokedHashes)
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'ai-super-math-grade6-revoked-codes.json';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      state.managementStatus = `已导出作废清单，共 ${state.revokedHashes.size} 个卡密。`;
      saveState();
      render();
    }

    function importRevokedList(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const payload = JSON.parse(String(reader.result || '{}'));
          const hashes = Array.isArray(payload.revokedHashes) ? payload.revokedHashes : [];
          state.revokedHashes = new Set(hashes.filter(hash => licenseRegistry.has(hash)));
          state.managementLog.unshift(`${new Date().toLocaleString('zh-CN', { hour12: false })} 导入作废清单 ${state.revokedHashes.size} 个`);
          state.managementLog = state.managementLog.slice(0, 12);
          state.managementStatus = `已导入作废清单，当前停用 ${state.revokedHashes.size} 个卡密。`;
          render();
        } catch (error) {
          state.managementStatus = '导入失败：文件格式不正确。';
          render();
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    function latestReadableMode() {
      if (state.accessProfile?.tier === 'parent') {
        return state.latestReport ? 'report' : 'wrongbook';
      }
      return 'lesson';
    }

    function checkVariantAnswer(answer, meta) {
      if (!answer) {
        return '你还没有填写答案，先试着自己做一遍。';
      }
      if (meta.type === 'choice') {
        return answer.toUpperCase() === String(meta.answer).toUpperCase()
          ? `答对了。${meta.explanation || ''}`
          : `这题还差一点，正确答案是 ${meta.answer}。${meta.explanation || ''}`;
      }
      if (meta.type === 'fill') {
        const normalized = answer.replace(/\s+/g, '').toLowerCase();
        const correct = (meta.answerText || []).some(item => normalized === String(item).replace(/\s+/g, '').toLowerCase());
        return correct
          ? `答对了。${meta.explanation || ''}`
          : `这题还需要再想想。提示：${meta.explanation || '回到教材定义再看一眼。'}`;
      }
      const normalized = answer.toLowerCase();
      const hitCount = (meta.keywords || []).filter(keyword => normalized.includes(String(keyword).toLowerCase())).length;
      const ratio = meta.keywords && meta.keywords.length ? hitCount / meta.keywords.length : 0;
      return ratio >= 0.6
        ? `思路基本对了。${meta.explanation || ''}`
        : `这题表达还不够完整。提示：${meta.explanation || '把关键条件、关系和结论补全。'}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }
  </script>
</body>
</html>
